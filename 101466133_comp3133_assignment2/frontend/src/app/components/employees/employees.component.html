<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="mb-0">Employees List</h2>
    <div class="d-flex gap-2">
      <a routerLink="/employees/add" class="btn btn-primary">Add Employee</a>
      <button class="btn btn-danger" (click)="logout()">Logout</button>
    </div>
  </div>

  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <div class="row g-3">
        <div class="col-md-5">
          <label class="form-label">Search by Position</label>
          <input type="text" class="form-control" [(ngModel)]="searchPosition" placeholder="Developer" />
        </div>

        <div class="col-md-5">
          <label class="form-label">Search by Department</label>
          <input type="text" class="form-control" [(ngModel)]="searchDepartment" placeholder="IT" />
        </div>

        <div class="col-md-2 d-flex align-items-end gap-2">
          <button class="btn btn-success w-100" (click)="onSearch()">Search</button>
          <button class="btn btn-secondary w-100" (click)="clearSearch()">Clear</button>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="loading" class="alert alert-info">
    Loading employees...
  </div>

  <div *ngIf="errorMessage && !loading" class="alert alert-danger">
    {{ errorMessage }}
  </div>

  <div *ngIf="!loading && !errorMessage" class="table-responsive">
    <table class="table table-bordered table-striped align-middle">
      <thead class="table-dark">
        <tr>
          <th>Photo</th>
          <th>First Name</th>
          <th>Last Name</th>
          <th>Email</th>
          <th>Position</th>
          <th>Department</th>
          <th style="width: 220px;">Actions</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let emp of employees">
          <td>
            <img
              *ngIf="emp.employee_photo"
              [src]="emp.employee_photo"
              alt="Employee"
              width="60"
              height="60"
              style="object-fit: cover; border-radius: 8px;"
            />
            <span *ngIf="!emp.employee_photo">No photo</span>
          </td>
          <td>{{ emp.first_name }}</td>
          <td>{{ emp.last_name }}</td>
          <td>{{ emp.email }}</td>
          <td>{{ emp.position }}</td>
          <td>{{ emp.department }}</td>
          <td>
            <div class="d-flex gap-2">
              <a [routerLink]="['/employees', emp._id]" class="btn btn-info btn-sm text-white">View</a>
              <a [routerLink]="['/employees/edit', emp._id]" class="btn btn-warning btn-sm">Edit</a>
              <button class="btn btn-danger btn-sm" (click)="deleteEmployee(emp._id)">Delete</button>
            </div>
          </td>
        </tr>

        <tr *ngIf="employees.length === 0">
          <td colspan="7" class="text-center">No employees found.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
